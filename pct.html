// ═══════════════════════════════════════════════════════════
// SLIDE RENDERER
// ═══════════════════════════════════════════════════════════

const SLIDE_CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dulux-navy: #1B2A4A;
    --dulux-red: #C8102E;
    --dulux-sky: #00A9CE;
    --aivolve-teal: #00C2A0;
    --white: #FFFFFF;
    --text-dark: #111827;
    --text-mid: #374151;
  }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    font-family:'Inter',sans-serif;
    background:#fff;
    width: 1100px;
    height: 620px;
    transform-origin: top left;
    overflow: hidden;
  }
  .slide { width:100%; height:100%; position:relative; overflow:hidden; display:flex; flex-direction:column; }
  .slide.light { background:#F7F8FA; }
  .slide.dark-navy { background:var(--dulux-navy); }
  .slide.dark-teal { background:linear-gradient(135deg,#003D35,#005A4F); }

  .slide-inner { flex:1; display:flex; flex-direction:column; min-height:0; }

  .eyebrow {
    font-size:17px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    color:var(--dulux-sky); margin-bottom:10px;
  }

  .section-badge {
    display:inline-block; font-size:17px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
    padding:6px 16px; border-radius:6px; color:#fff; margin-bottom:20px;
    background:var(--dulux-sky); width:fit-content;
  }

  .demo-badge {
    display:inline-block; background:var(--aivolve-teal); color:#fff; font-size:17px; font-weight:800;
    letter-spacing:.08em; text-transform:uppercase; padding:6px 16px; border-radius:6px; width:fit-content;
  }
`;

function buildSlideHTML(slide) {
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${SLIDE_CSS}</style></head><body>${slide.html}<script>
  (function() {
    var DESIGN_W = 1100, DESIGN_H = 620;
    function scale() {
      var s = Math.min(window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
      document.body.style.transform = 'scale(' + s + ')';
      document.body.style.width = DESIGN_W + 'px';
      document.body.style.height = DESIGN_H + 'px';
    }
    scale();
    window.addEventListener('resize', scale);
  })();
<\/script></body></html>`;
}

let currentSlide = 0;
const total = SLIDES.length;

function buildTOC() {
  const container = document.getElementById('toc-list');
  const sections = {};
  SLIDES.forEach((s, i) => {
    if (!sections[s.section]) sections[s.section] = [];
    sections[s.section].push({ title: s.title, index: i });
  });
  let html = '';
  for (const [section, items] of Object.entries(sections)) {
    html += `<div class="toc-section"><div class="toc-section-label">${section}</div>`;
    items.forEach(item => {
      html += `<button class="toc-item" id="toc-${item.index}" onclick="goToSlide(${item.index})">${item.title}</button>`;
    });
    html += '</div>';
  }
  container.innerHTML = html;
}

function updateTOCActive() {
  document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
  const active = document.getElementById(`toc-${currentSlide}`);
  if (active) active.classList.add('active');
}

function renderSlide(index) {
  const slide = SLIDES[index];
  const frame = document.getElementById('slide-frame');
  frame.srcdoc = buildSlideHTML(slide);
  document.getElementById('notes-content').innerHTML = slide.notes.replace(/\n/g, '<br>');
  document.getElementById('slide-counter').textContent = `${index + 1} / ${total}`;
  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === total - 1;
  updateTOCActive();
}

function nextSlide() { if (currentSlide < total - 1) { currentSlide++; renderSlide(currentSlide); } }
function prevSlide() { if (currentSlide > 0) { currentSlide--; renderSlide(currentSlide); } }
function goToSlide(index) { currentSlide = index; renderSlide(currentSlide); toggleTOC(); }

function toggleNotes() {
  const panel = document.getElementById('notes-panel');
  const btn = document.getElementById('notes-toggle-btn');
  panel.classList.toggle('visible');
  btn.classList.toggle('active');
  btn.textContent = panel.classList.contains('visible') ? '📋 Hide Notes' : '📋 Speaker Notes';
}

function toggleTOC() {
  const overlay = document.getElementById('toc-overlay');
  overlay.classList.toggle('open');
  if (overlay.classList.contains('open')) updateTOCActive();
}
function closeTOCOutside(e) {
  if (e.target === document.getElementById('toc-overlay')) toggleTOC();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') nextSlide();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
  if (e.key === 'Escape') {
    const overlay = document.getElementById('toc-overlay');
    if (overlay.classList.contains('open')) overlay.classList.remove('open');
  }
});

buildTOC();
renderSlide(0);
</script>
</body>
</html>
