function buildSlideHTML(slide) {
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${SLIDE_CSS}</style></head><body>${slide.html}</body></html>`;
}

// ═══════════════════════════════════════════════════════════
// TOC BUILDER
// ═══════════════════════════════════════════════════════════

let currentSlide = 0;
const total = SLIDES.length;

function buildTOC() {
  const container = document.getElementById('toc-list');
  const sections = {};
  SLIDES.forEach((s, i) => {
    if (!sections[s.section]) sections[s.section] = [];
    sections[s.section].push({ title: s.title, index: i });
  });
  let html = '';
  for (const [section, items] of Object.entries(sections)) {
    html += `<div class="toc-section"><div class="toc-section-label">${section}</div>`;
    items.forEach(item => {
      html += `<button class="toc-item" id="toc-${item.index}" onclick="goToSlide(${item.index})">${item.title}</button>`;
    });
    html += '</div>';
  }
  container.innerHTML = html;
}

function updateTOCActive() {
  document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
  const active = document.getElementById(`toc-${currentSlide}`);
  if (active) active.classList.add('active');
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════

function renderSlide(index) {
  const slide = SLIDES[index];
  const frame = document.getElementById('slide-frame');
  frame.srcdoc = buildSlideHTML(slide);
  document.getElementById('notes-content').innerHTML = slide.notes.replace(/\n/g, '<br>');
  document.getElementById('slide-counter').textContent = `${index + 1} / ${total}`;
  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === total - 1;
  updateTOCActive();
}

function nextSlide() {
  if (currentSlide < total - 1) { currentSlide++; renderSlide(currentSlide); }
}
function prevSlide() {
  if (currentSlide > 0) { currentSlide--; renderSlide(currentSlide); }
}
function goToSlide(index) {
  currentSlide = index;
  renderSlide(currentSlide);
  toggleTOC();
}

// ═══════════════════════════════════════════════════════════
// NOTES TOGGLE
// ═══════════════════════════════════════════════════════════

function toggleNotes() {
  const panel = document.getElementById('notes-panel');
  const btn = document.getElementById('notes-toggle-btn');
  panel.classList.toggle('visible');
  btn.classList.toggle('active');
  btn.textContent = panel.classList.contains('visible') ? '📋 Hide Notes' : '📋 Speaker Notes';
}

function toggleTOC() {
  const overlay = document.getElementById('toc-overlay');
  overlay.classList.toggle('open');
  if (overlay.classList.contains('open')) updateTOCActive();
}
function closeTOCOutside(e) {
  if (e.target === document.getElementById('toc-overlay')) toggleTOC();
}

// ═══════════════════════════════════════════════════════════
// KEYBOARD NAV
// ═══════════════════════════════════════════════════════════

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') nextSlide();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
  if (e.key === 'Escape') {
    const overlay = document.getElementById('toc-overlay');
    if (overlay.classList.contains('open')) overlay.classList.remove('open');
  }
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

buildTOC();
renderSlide(0);
</script>
